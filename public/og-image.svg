<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#f8fafc"/>
  <!-- 顶部色条 -->
  <rect width="1200" height="6" fill="#3b82f6"/>

  <!-- 中心卡片 -->
  <rect x="180" y="100" width="840" height="430" rx="24" fill="white"
        filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#0001" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 图标区域 -->
  <rect x="540" y="148" width="120" height="120" rx="28" fill="#eff6ff"/>
  <!-- 图片压缩图标（简化） -->
  <rect x="564" y="172" width="72" height="52" rx="6" fill="#3b82f6" opacity="0.15"/>
  <rect x="564" y="172" width="72" height="52" rx="6" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <!-- 箭头 -->
  <text x="600" y="205" text-anchor="middle" font-size="28" fill="#3b82f6">↓</text>
  <rect x="574" y="220" width="52" height="38" rx="4" fill="#3b82f6" opacity="0.3"/>
  <rect x="574" y="220" width="52" height="38" rx="4" fill="none" stroke="#3b82f6" stroke-width="2"/>

  <!-- 主标题 -->
  <text x="600" y="316" text-anchor="middle"
        font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="48" font-weight="700" fill="#0f172a">图片压缩工具</text>

  <!-- 副标题 -->
  <text x="600" y="368" text-anchor="middle"
        font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="26" fill="#64748b">免费在线压缩 · 本地处理 · 隐私优先</text>

  <!-- 格式标签 -->
  <g font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="600">
    <!-- JPEG -->
    <rect x="248" y="408" width="96" height="36" rx="18" fill="#fee2e2"/>
    <text x="296" y="431" text-anchor="middle" fill="#dc2626">JPEG</text>
    <!-- PNG -->
    <rect x="360" y="408" width="96" height="36" rx="18" fill="#dcfce7"/>
    <text x="408" y="431" text-anchor="middle" fill="#16a34a">PNG</text>
    <!-- WebP -->
    <rect x="472" y="408" width="96" height="36" rx="18" fill="#dbeafe"/>
    <text x="520" y="431" text-anchor="middle" fill="#2563eb">WebP</text>
    <!-- AVIF -->
    <rect x="584" y="408" width="96" height="36" rx="18" fill="#f3e8ff"/>
    <text x="632" y="431" text-anchor="middle" fill="#7c3aed">AVIF</text>
    <!-- GIF -->
    <rect x="696" y="408" width="96" height="36" rx="18" fill="#fef9c3"/>
    <text x="744" y="431" text-anchor="middle" fill="#ca8a04">GIF</text>
    <!-- 批量 -->
    <rect x="808" y="408" width="120" height="36" rx="18" fill="#f1f5f9"/>
    <text x="868" y="431" text-anchor="middle" fill="#475569">批量处理</text>
  </g>

  <!-- 底部域名（上线替换） -->
  <text x="600" y="576" text-anchor="middle"
        font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="20" fill="#94a3b8">YOUR_DOMAIN</text>
</svg>
